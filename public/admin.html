<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scálpit Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --burg: #7B1A2B;
      --burg-dark: #5A1020;
      --cream: #FAF4EE;
      --cream-mid: #F0E6DC;
      --gold: #C4A47C;
      --white: #FFFFFF;
      --dark: #1C0E0E;
      --text: #2D1818;
      --text-muted: #8B7070;
      --border: #E2D0C4;
      --bg-burg: #F5ECEC;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', 'Montserrat', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* ── 로그인 ── */
    .login-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #3A1018; padding: 24px;
    }
    .login-brand { text-align: center; margin-bottom: 48px; }
    .login-logo {
      height: 48px; width: auto;
      filter: brightness(0) invert(1);
      display: block; margin: 0 auto 12px;
    }
    .login-brand-line { width: 32px; height: 1px; background: var(--gold); margin: 14px auto; }
    .login-brand-sub {
      font-family: 'Montserrat', sans-serif;
      font-size: 8px; letter-spacing: 5px; color: var(--gold);
      font-weight: 500; text-transform: uppercase;
    }
    .login-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 32px 28px; width: 100%; max-width: 320px; text-align: center;
    }
    .login-label {
      font-family: 'Montserrat', sans-serif;
      font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; margin-bottom: 12px; display: block;
    }
    .login-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
      color: var(--white); font-size: 14px; outline: none;
      font-family: 'Montserrat', sans-serif; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: rgba(255,255,255,0.4); }
    .login-input::placeholder { color: rgba(255,255,255,0.2); }
    .login-btn {
      width: 100%; padding: 14px; background: var(--burg); color: var(--white);
      border: none; cursor: pointer; font-size: 10px; font-weight: 700;
      font-family: 'Montserrat', sans-serif; letter-spacing: 3px; text-transform: uppercase;
      transition: background 0.2s;
    }
    .login-btn:hover { background: var(--burg-dark); }
    .login-err { font-size: 12px; color: #E07070; margin-top: 10px; display: none; }
    .login-err.show { display: block; }

    /* ── 관리자 화면 ── */
    .admin-wrap { display: none; }

    /* 헤더 */
    .admin-header {
      background: var(--burg); padding: 20px 24px;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header-inner {
      max-width: 1100px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-header-left { display: flex; flex-direction: column; }
    .admin-logo {
      height: 24px; width: auto;
      filter: brightness(0) invert(1);
      display: block;
    }
    .admin-tagline {
      font-family: 'Montserrat', sans-serif;
      font-size: 7px; letter-spacing: 3px; color: rgba(255,255,255,0.45);
      text-transform: uppercase; margin-top: 4px;
    }
    .admin-header-right { display: flex; align-items: center; gap: 10px; }
    .total-badge {
      font-family: 'Montserrat', sans-serif; font-size: 9px; letter-spacing: 2px;
      color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.08);
      padding: 7px 14px; border: 1px solid rgba(255,255,255,0.15);
    }
    .logout-btn {
      font-family: 'Montserrat', sans-serif; font-size: 9px; color: rgba(255,255,255,0.45);
      cursor: pointer; letter-spacing: 2px; padding: 7px 14px;
      border: 1px solid rgba(255,255,255,0.15); background: transparent;
      text-transform: uppercase; transition: all 0.2s;
    }
    .logout-btn:hover { border-color: rgba(255,255,255,0.5); color: white; }

    /* 바디 */
    .admin-body { max-width: 1100px; margin: 0 auto; padding: 36px 20px 80px; }

    /* 통계 카드 */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      padding: 20px; border-left: 2px solid var(--burg);
    }
    .stat-label {
      font-family: 'Montserrat', sans-serif; font-size: 8px; letter-spacing: 3px;
      color: var(--burg); text-transform: uppercase; margin-bottom: 10px; font-weight: 600;
    }
    .stat-val {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 400; color: var(--dark); line-height: 1;
    }
    .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* 필터 바 */
    .filter-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .filter-input {
      flex: 1; min-width: 200px; padding: 11px 14px;
      background: var(--white); border: 1px solid var(--border);
      font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
      color: var(--text); outline: none;
    }
    .filter-input:focus { border-color: var(--burg); }
    .filter-select {
      padding: 11px 14px; background: var(--white); border: 1px solid var(--border);
      font-size: 13px; font-family: 'Noto Sans KR', sans-serif;
      color: var(--text); outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--burg); }
    .export-btn {
      padding: 11px 18px; background: var(--dark); color: var(--white);
      border: none; cursor: pointer; font-size: 10px; font-weight: 700;
      font-family: 'Montserrat', sans-serif; letter-spacing: 2px; text-transform: uppercase;
      transition: background 0.2s; white-space: nowrap;
    }
    .export-btn:hover { background: var(--burg); }

    /* 테이블 */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; background: var(--white); }
    th {
      background: var(--dark); color: rgba(255,255,255,0.7);
      font-family: 'Montserrat', sans-serif; font-size: 8px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 13px 14px; text-align: left; white-space: nowrap;
    }
    td { padding: 13px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FFF8F5; cursor: pointer; }
    .td-name { font-weight: 700; color: var(--dark); }
    .td-phone { font-family: 'Montserrat', sans-serif; color: var(--text-muted); font-size: 12px; }
    .td-date { font-family: 'Montserrat', sans-serif; font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    .tag {
      display: inline-block; font-size: 9px; padding: 3px 8px;
      font-family: 'Montserrat', sans-serif; font-weight: 600; letter-spacing: 0.5px;
      margin: 2px 2px 2px 0; white-space: nowrap;
    }
    .tag-res1 { background: var(--bg-burg); color: var(--burg); }
    .tag-res2 { background: #EDF2F5; color: #1A3A4A; }
    .tag-cons1 { background: var(--cream-mid); color: #6B4020; }
    .tag-cons2 { background: #EDF5EE; color: #1A4A20; }
    .tag-lang { background: var(--dark); color: rgba(255,255,255,0.65); font-size: 8px; }

    .concern-list { font-size: 11px; color: var(--text-muted); line-height: 1.7; max-width: 180px; }
    .del-btn {
      background: none; border: 1px solid var(--border); color: var(--text-muted);
      font-size: 9px; padding: 5px 10px; cursor: pointer;
      font-family: 'Montserrat', sans-serif; letter-spacing: 1px; text-transform: uppercase;
      transition: all 0.2s; white-space: nowrap;
    }
    .del-btn:hover { background: var(--burg); border-color: var(--burg); color: white; }

    .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); background: var(--white); border: 1px solid var(--border); }
    .empty-logo { height: 32px; width: auto; opacity: 0.15; margin: 0 auto 16px; display: block; }

    /* 상세 패널 */
    .detail-panel {
      display: none; position: fixed; inset: 0;
      background: rgba(28,14,14,0.55); z-index: 300;
      align-items: center; justify-content: center; padding: 20px;
    }
    .detail-panel.open { display: flex; }
    .detail-box {
      background: var(--cream); border: 1px solid var(--border);
      width: 100%; max-width: 540px; max-height: 88vh; overflow-y: auto;
    }
    .detail-header {
      background: var(--burg); padding: 18px 20px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0;
    }
    .detail-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-style: italic; font-weight: 400; color: white;
    }
    .detail-close {
      background: none; border: none; color: rgba(255,255,255,0.55);
      font-size: 18px; cursor: pointer; padding: 4px 8px; line-height: 1;
      transition: color 0.2s;
    }
    .detail-close:hover { color: white; }
    .detail-body { padding: 24px; }
    .detail-section {
      font-family: 'Montserrat', sans-serif; font-size: 8px; font-weight: 600;
      letter-spacing: 3px; color: var(--burg); text-transform: uppercase;
      margin: 20px 0 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .detail-section:first-child { margin-top: 0; }
    .detail-row { display: flex; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); }
    .detail-row:last-child { border-bottom: none; }
    .detail-key {
      font-size: 10px; letter-spacing: 1.5px; color: var(--text-muted);
      font-family: 'Montserrat', sans-serif; text-transform: uppercase;
      min-width: 110px; flex-shrink: 0; padding-top: 2px; font-weight: 500;
    }
    .detail-val { font-size: 13px; color: var(--dark); line-height: 1.7; flex: 1; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-brand">
    <img src="scalpit-logo.png" alt="Scálpit" class="login-logo" />
    <div class="login-brand-line"></div>
    <div class="login-brand-sub">Admin Console</div>
  </div>
  <div class="login-box">
    <span class="login-label">Password</span>
    <input type="password" class="login-input" id="pwInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    <button class="login-btn" onclick="doLogin()">LOGIN</button>
    <div class="login-err" id="loginErr">비밀번호가 올바르지 않습니다.</div>
  </div>
</div>

<!-- 관리자 화면 -->
<div class="admin-wrap" id="adminWrap">

  <header class="admin-header">
    <div class="admin-header-inner">
      <div class="admin-header-left">
        <img src="scalpit-logo.png" alt="Scálpit" class="admin-logo" />
        <div class="admin-tagline" id="adminTagline">Admin Console</div>
      </div>
      <div class="admin-header-right">
        <div class="total-badge" id="totalBadge">TOTAL — 0</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </header>

  <div class="admin-body">

    <!-- 통계 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-val" id="stTotal">0</div>
        <div class="stat-sub">전체 접수</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-val" id="stToday">0</div>
        <div class="stat-sub">오늘 접수</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">2인 이상</div>
        <div class="stat-val" id="stMulti">0</div>
        <div class="stat-sub">단체 예약</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">정밀 진단</div>
        <div class="stat-val" id="stDetail">0</div>
        <div class="stat-sub">상담 희망</div>
      </div>
    </div>

    <!-- 필터 -->
    <div class="filter-bar">
      <input type="text" class="filter-input" id="searchInput" placeholder="이름 / 연락처 검색..." oninput="renderTable()" />
      <select class="filter-select" id="langFilter" onchange="renderTable()">
        <option value="">언어 전체</option>
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ja">日本語</option>
      </select>
      <select class="filter-select" id="resFilter" onchange="renderTable()">
        <option value="">예약 유형 전체</option>
        <option value="2인">2인 이상</option>
        <option value="1인">1인</option>
      </select>
      <button class="export-btn" onclick="exportCSV()">CSV 내보내기</button>
    </div>

    <!-- 테이블 -->
    <div class="table-wrap" id="tableWrap">
      <table id="dataTable">
        <thead>
          <tr>
            <th>#</th>
            <th>접수 일시</th>
            <th>이름 / 생년월일</th>
            <th>연락처</th>
            <th>예약</th>
            <th>상담 유형</th>
            <th>두피 고민</th>
            <th>관심 서비스</th>
            <th>유입 경로</th>
            <th>언어</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none">
      <img src="scalpit-logo.png" alt="" class="empty-logo" />
      아직 접수된 설문이 없습니다.
    </div>

  </div>
</div>

<!-- 상세 패널 -->
<div class="detail-panel" id="detailPanel" onclick="if(event.target===this)closeDetail()">
  <div class="detail-box">
    <div class="detail-header">
      <div class="detail-title" id="detailTitle">상세 정보</div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>
</div>

<script>
let adminPw = '';
let allData = [];

fetch('/api/branch').then(r => r.json()).then(b => {
  if (b.slug !== 'root') {
    document.getElementById('adminTagline').textContent = `Admin Console — ${b.name}`;
  }
}).catch(() => {});

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const res = await fetch('/api/submissions', { headers: { 'x-admin-password': pw } });
  if (res.status === 401) { document.getElementById('loginErr').classList.add('show'); return; }
  adminPw = pw;
  const json = await res.json();
  allData = json.data || [];
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('adminWrap').style.display = 'block';
  renderStats(); renderTable();
}

function logout() {
  adminPw = ''; allData = [];
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').classList.remove('show');
}

function renderStats() {
  const today = new Date().toLocaleDateString('sv');
  document.getElementById('stTotal').textContent = allData.length;
  document.getElementById('stToday').textContent = allData.filter(d => (d.submittedAt||'').startsWith(today)).length;
  document.getElementById('stMulti').textContent = allData.filter(d => (d.reservationType||'').includes('2인')).length;
  document.getElementById('stDetail').textContent = allData.filter(d => (d.consultationType||'').includes('정밀')).length;
  document.getElementById('totalBadge').textContent = `TOTAL — ${allData.length}`;
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const lf = document.getElementById('langFilter').value;
  const rf = document.getElementById('resFilter').value;
  return allData.filter(d => {
    const nb = (d.nameBirth || d.name || '').toLowerCase();
    const ph = (d.phone || '').toLowerCase();
    if (q && !nb.includes(q) && !ph.includes(q)) return false;
    if (lf && d.lang !== lf) return false;
    if (rf && !(d.reservationType||'').includes(rf)) return false;
    return true;
  });
}

function renderTable() {
  const filtered = getFiltered().slice().reverse();
  document.getElementById('emptyState').style.display = filtered.length ? 'none' : '';
  document.getElementById('tableWrap').style.display = filtered.length ? '' : 'none';

  document.getElementById('tableBody').innerHTML = filtered.map((d, i) => {
    const dt = d.submittedAt ? new Date(d.submittedAt).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '-';
    const nb = d.nameBirth || d.name || '-';
    const isMulti = (d.reservationType||'').includes('2인');
    const isDetail = (d.consultationType||'').includes('정밀');
    const concerns = (d.scalpConcerns||[]).join(', ') || '-';
    const services = (d.desiredServices||[]).join(', ') || '-';
    return `<tr onclick="showDetail(${d.id})">
      <td class="td-date">${allData.length - i}</td>
      <td class="td-date">${dt}</td>
      <td class="td-name">${nb}</td>
      <td class="td-phone">${d.phone||'-'}</td>
      <td><span class="tag ${isMulti ? 'tag-res1' : 'tag-res2'}">${isMulti ? '2인+' : '1인'}</span></td>
      <td><span class="tag ${isDetail ? 'tag-cons2' : 'tag-cons1'}">${isDetail ? '정밀' : '힐링'}</span></td>
      <td><div class="concern-list">${concerns}</div></td>
      <td style="font-size:12px;color:var(--text-muted);max-width:160px">${services}</td>
      <td style="font-size:12px;color:var(--text-muted)">${d.visitSource||'-'}</td>
      <td><span class="tag tag-lang">${(d.lang||'ko').toUpperCase()}</span></td>
      <td onclick="event.stopPropagation()"><button class="del-btn" onclick="delEntry(${d.id})">삭제</button></td>
    </tr>`;
  }).join('');
}

function showDetail(id) {
  const d = allData.find(x => x.id === id);
  if (!d) return;
  const dt = d.submittedAt ? new Date(d.submittedAt).toLocaleString('ko-KR') : '-';
  const row = (k, v) => `<div class="detail-row"><div class="detail-key">${k}</div><div class="detail-val">${v||'-'}</div></div>`;
  document.getElementById('detailTitle').textContent = (d.nameBirth||d.name||'상세 정보').split('/')[0].trim();
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-section">예약 정보</div>
    ${row('접수 일시', dt)}
    ${row('예약 인원', d.reservationType)}
    ${row('상담 유형', d.consultationType)}
    <div class="detail-section">기본 정보</div>
    ${row('이름 / 생년월일', d.nameBirth || d.name)}
    ${row('연락처', d.phone)}
    ${row('주소', d.address)}
    <div class="detail-section">시술 이력 & 경로</div>
    ${row('관리 경험', (d.treatmentHistory||[]).join(', ')||'없음')}
    ${row('유입 경로', d.visitSource)}
    <div class="detail-section">두피 상태</div>
    ${row('주요 고민', (d.scalpConcerns||[]).join(', '))}
    ${row('펌 / 염색 주기', d.permFrequency)}
    ${row('샴푸 횟수', d.shampooFrequency)}
    ${row('탈모 유전력', d.hairLossGenetic)}
    <div class="detail-section">서비스 & 동의</div>
    ${row('관심 서비스', (d.desiredServices||[]).join(', '))}
    ${row('촬영 동의', d.videoConsent === '동의' ? '✓ 동의' : '✗ 비동의')}
    ${row('마케팅 동의', d.marketingConsent ? '✓ 동의' : '✗ 비동의')}
    ${row('언어', (d.lang||'ko').toUpperCase())}
  `;
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() { document.getElementById('detailPanel').classList.remove('open'); }

async function delEntry(id) {
  if (!confirm('이 항목을 삭제하시겠습니까?')) return;
  const res = await fetch(`/api/submissions/${id}`, { method: 'DELETE', headers: { 'x-admin-password': adminPw } });
  if (res.ok) { allData = allData.filter(d => d.id !== id); renderStats(); renderTable(); }
}

function exportCSV() {
  const filtered = getFiltered().slice().reverse();
  const headers = ['번호','접수일시','이름/생년월일','연락처','주소','예약유형','상담유형','관리경험','유입경로','두피고민','펌/염색주기','샴푸횟수','탈모유전력','관심서비스','촬영동의','마케팅동의','언어'];
  const rows = filtered.map((d,i) => [
    i+1,
    d.submittedAt ? new Date(d.submittedAt).toLocaleString('ko-KR') : '',
    d.nameBirth||d.name||'', d.phone||'', d.address||'',
    d.reservationType||'', d.consultationType||'',
    (d.treatmentHistory||[]).join('/'), d.visitSource||'',
    (d.scalpConcerns||[]).join('/'), d.permFrequency||'',
    d.shampooFrequency||'', d.hairLossGenetic||'',
    (d.desiredServices||[]).join('/'),
    d.videoConsent||'', d.marketingConsent ? 'Y' : 'N', d.lang||'ko'
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `scalpit_${new Date().toLocaleDateString('sv')}.csv`;
  a.click();
}
</script>
</body>
</html>
